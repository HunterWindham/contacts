<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="contacts-api-base" content="http://127.0.0.1:5000/api" />
    <title>Contacts</title>
    <!-- Tailwind v4 browser build (CDN) for fast MVP styling. -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900 antialiased">
    <main class="h-screen overflow-hidden">
      <div
        data-region="toast"
        class="pointer-events-none fixed inset-x-0 top-4 z-50 mx-auto flex max-w-md justify-center"
      ></div>

      <div class="grid h-full grid-cols-[280px_1fr] p-4">
        <aside class="rounded-2xl border border-slate-200 bg-white/90 p-5 shadow-sm backdrop-blur">
          <header class="flex items-center justify-between">
            <h1 class="text-3xl font-semibold leading-none tracking-tight text-slate-950">Contacts</h1>
            <button
              type="button"
              data-action="new"
              aria-label="Add new contact"
              class="inline-flex h-9 w-9 items-center justify-center rounded-full bg-blue-600 text-3xl leading-none text-white shadow-sm transition hover:bg-blue-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-400"
            >
              <span aria-hidden="true" class="-translate-y-0.5">+</span>
            </button>
          </header>

          <label class="mt-4 block">
            <span class="sr-only">Search contacts</span>
            <input
              type="search"
              data-region="search"
              placeholder="Search name or email"
              autocomplete="off"
              class="block h-10 w-full rounded-xl border border-slate-300 bg-slate-50 px-3 text-sm text-slate-700 outline-none transition focus:border-blue-400 focus:bg-white focus:ring-2 focus:ring-blue-100"
            />
          </label>

          <div
            data-region="list-status"
            class="hidden mt-4 text-sm text-slate-600"
          ></div>

          <ul
            data-region="list"
            aria-label="Contacts list"
            class="mt-4 max-h-[calc(100vh-150px)] space-y-1 overflow-y-auto pr-1"
          ></ul>
        </aside>

        <section aria-label="Contact form" class="flex h-full flex-col rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
          <form data-region="form" class="flex h-full flex-col" novalidate>
            <input type="hidden" name="id" />

            <h2 data-region="form-title" class="sr-only">Contact details</h2>
            <span data-region="count" class="sr-only">0 contacts</span>

            <div class="grid gap-6 md:grid-cols-2">
              <label class="block">
                <span class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-slate-500">
                  First Name
                </span>
                <input
                  type="text"
                  name="first_name"
                  required
                  autocomplete="given-name"
                  class="block h-11 w-full rounded-xl border border-slate-300 bg-slate-50 px-3.5 text-base text-slate-700 outline-none transition focus:border-blue-400 focus:bg-white focus:ring-2 focus:ring-blue-100"
                />
              </label>
              <label class="block">
                <span class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-slate-500">
                  Last Name
                </span>
                <input
                  type="text"
                  name="last_name"
                  required
                  autocomplete="family-name"
                  class="block h-11 w-full rounded-xl border border-slate-300 bg-slate-50 px-3.5 text-base text-slate-700 outline-none transition focus:border-blue-400 focus:bg-white focus:ring-2 focus:ring-blue-100"
                />
              </label>
            </div>

            <div class="mt-7">
              <p class="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500">Email</p>
              <ul data-region="emails-list" class="space-y-1"></ul>
              <button
                type="button"
                data-action="add-email"
                class="mt-3 inline-flex items-center gap-2 rounded-lg px-2 py-1 text-sm font-medium text-blue-600 transition hover:bg-blue-50 hover:text-blue-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-300"
              >
                <span class="inline-flex h-5 w-5 items-center justify-center rounded-full bg-blue-600 text-sm leading-none text-white">
                  <span class="-translate-y-[1px]">+</span>
                </span>
                <span class="leading-none">Add email</span>
              </button>
            </div>

            <label class="mt-7 block max-w-[360px]">
              <span class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-slate-500">
                Phone
              </span>
              <input
                type="tel"
                name="phone"
                autocomplete="tel"
                placeholder="(212) 555-0100"
                class="block h-11 w-full rounded-xl border border-slate-300 bg-slate-50 px-3.5 text-base text-slate-700 outline-none transition focus:border-blue-400 focus:bg-white focus:ring-2 focus:ring-blue-100"
              />
            </label>

            <ul
              data-region="form-errors"
              class="hidden mt-5 list-disc space-y-1 rounded-xl border border-rose-200 bg-rose-50 px-6 py-4 text-sm text-rose-700"
            ></ul>

            <div class="mt-auto flex items-end justify-between pt-8">
              <button
                type="button"
                data-action="delete-selected"
                class="h-11 min-w-[120px] rounded-xl border border-rose-300 bg-rose-500 px-5 text-sm font-semibold text-white transition hover:bg-rose-400 focus:outline-none focus-visible:ring-2 focus-visible:ring-rose-300 disabled:cursor-not-allowed disabled:opacity-40"
              >
                Delete
              </button>
              <div class="flex items-center gap-3">
                <button
                  type="button"
                  data-action="reset"
                  class="h-11 min-w-[120px] rounded-xl border border-slate-300 bg-white px-5 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-300"
                >
                  Cancel
                </button>
                <button
                  type="submit"
                  data-region="submit"
                  class="h-11 min-w-[120px] rounded-xl border border-blue-500 bg-blue-600 px-5 text-sm font-semibold text-white transition hover:bg-blue-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-300 disabled:cursor-not-allowed disabled:opacity-60"
                >
                  Save
                </button>
              </div>
            </div>
          </form>
        </section>
      </div>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
